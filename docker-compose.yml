# ─────────────────────────────────────────────────────────────────────────────
#  Employee Directory + QA Observability Stack — Docker Compose
#
#  App services:
#    mongodb       — MongoDB 7 with seeded employee data
#    backend       — Express/TypeScript REST API  (port 4000)
#    frontend      — React/Vite SPA via nginx     (port 3000)
#
#  Observability services (QA pipeline reporting):
#    elasticsearch — Single-node ES 8 cluster    (port 9200)
#    kibana        — Kibana dashboards            (port 5601)
#    kibana-setup  — One-shot data view creation  (exits after setup)
#
#  Quick start:
#    docker compose up --build
#
#  Then open:
#    App:           http://localhost:3000
#    API health:    http://localhost:4000/api/health
#    Kibana:        http://localhost:5601
#    Elasticsearch: http://localhost:9200
#    Mongo shell:   docker compose exec mongodb mongosh employee_directory
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: emp-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: employee_directory

    volumes:
      # Persistent data across restarts
      - mongo_data:/data/db
      # Seed script — runs once on first startup
      - ./employee-app/mongo-init/seed.js:/docker-entrypoint-initdb.d/seed.js:ro

    ports:
      - "27017:27017"

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - emp-net

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./employee-app/backend
      dockerfile: Dockerfile
    container_name: emp-backend
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 4000
      # Uses admin credentials to connect; Mongoose creates the DB if needed
      MONGODB_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/employee_directory?authSource=admin
      CORS_ORIGIN: http://localhost:3000

    ports:
      - "4000:4000"

    depends_on:
      mongodb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 25s

    networks:
      - emp-net

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./employee-app/frontend
      dockerfile: Dockerfile
    container_name: emp-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - emp-net

  # ── Observability: Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: qa-elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    ports:
      - "9200:9200"

    volumes:
      - es_data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - emp-net

  # ── Observability: Kibana ─────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: qa-kibana
    restart: unless-stopped

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

    networks:
      - emp-net

  # ── Observability: Kibana setup (one-shot, exits after creating data views) ────
  kibana-setup:
    image: curlimages/curl:latest
    container_name: qa-kibana-setup
    restart: "no"

    depends_on:
      kibana:
        condition: service_healthy

    command:
      - sh
      - -c
      - |
        echo "Creating Kibana data views..."
        curl -s -X POST "http://kibana:5601/api/data_views/data_view" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"data_view":{"title":"qa-test-runs","timeFieldName":"@timestamp","name":"QA Test Runs"}}'
        echo ""
        curl -s -X POST "http://kibana:5601/api/data_views/data_view" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"data_view":{"title":"qa-failed-tests","timeFieldName":"@timestamp","name":"QA Failed Tests"}}'
        echo ""
        echo "Kibana setup complete. Open http://localhost:5601 to build dashboards."

    networks:
      - emp-net

# ── Volumes & networks ──────────────────────────────────────────────────────────
volumes:
  mongo_data:
    name: emp-mongo-data
  es_data:
    name: qa-es-data

networks:
  emp-net:
    name: emp-network
    driver: bridge
