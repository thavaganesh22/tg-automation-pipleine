openapi: "3.1.0"

info:
  title: Employee Directory API
  version: "1.0.0"
  description: |
    REST API for managing employee records stored in MongoDB.
    All endpoints return JSON. Dates are ISO-8601 strings.
  contact:
    name: QA Pipeline
  license:
    name: MIT

servers:
  - url: http://localhost:4000/api
    description: Local development (Docker Compose)
  - url: https://api.yourcompany.com/api
    description: Production

tags:
  - name: Employees
    description: CRUD operations on employee records
  - name: Health
    description: Service health check

# ── Reusable components ──────────────────────────────────────────────────────
components:
  schemas:

    EmployeeId:
      type: string
      pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId (24-character hex string)
      example: "64a7f3c2b1e2f30012345678"

    Department:
      type: string
      enum:
        - Engineering
        - Product
        - Design
        - QA
        - DevOps
        - Data
        - Marketing
        - Sales
        - HR
        - Finance
        - Legal
        - Operations
        - Other

    EmploymentType:
      type: string
      enum: [Full-Time, Part-Time, Contract, Intern]

    EmploymentStatus:
      type: string
      enum: [Active, On Leave, Terminated]

    Address:
      type: object
      required: [street, city, country]
      properties:
        street:
          type: string
          maxLength: 200
          example: "123 Innovation Drive"
        city:
          type: string
          maxLength: 100
          example: "Toronto"
        state:
          type: string
          maxLength: 100
          example: "Ontario"
        postalCode:
          type: string
          maxLength: 20
          example: "M5V 3A8"
        country:
          type: string
          maxLength: 100
          example: "Canada"

    Employee:
      type: object
      required:
        - _id
        - firstName
        - lastName
        - email
        - designation
        - department
        - employmentType
        - employmentStatus
        - startDate
        - address
        - createdAt
        - updatedAt
      properties:
        _id:
          $ref: "#/components/schemas/EmployeeId"
        firstName:
          type: string
          maxLength: 100
          example: "Thava"
        lastName:
          type: string
          maxLength: 100
          example: "Gopal"
        email:
          type: string
          format: email
          example: "thava.gopal@company.com"
        phone:
          type: string
          maxLength: 30
          example: "+1-416-555-0192"
          nullable: true
        designation:
          type: string
          maxLength: 150
          example: "Senior QA Engineer"
        department:
          $ref: "#/components/schemas/Department"
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        employmentStatus:
          $ref: "#/components/schemas/EmploymentStatus"
        startDate:
          type: string
          format: date
          example: "2022-03-15"
        address:
          $ref: "#/components/schemas/Address"
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: "https://api.dicebear.com/7.x/initials/svg?seed=TG"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmployeeListItem:
      type: object
      description: Lightweight summary used in list views
      required: [_id, firstName, lastName, email, designation, department, employmentStatus]
      properties:
        _id:
          $ref: "#/components/schemas/EmployeeId"
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        designation:
          type: string
        department:
          $ref: "#/components/schemas/Department"
        employmentStatus:
          $ref: "#/components/schemas/EmploymentStatus"
        avatarUrl:
          type: string
          format: uri
          nullable: true

    CreateEmployeeRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - designation
        - department
        - employmentType
        - employmentStatus
        - startDate
        - address
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 30
        designation:
          type: string
          minLength: 1
          maxLength: 150
        department:
          $ref: "#/components/schemas/Department"
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        employmentStatus:
          $ref: "#/components/schemas/EmploymentStatus"
        startDate:
          type: string
          format: date
        address:
          $ref: "#/components/schemas/Address"
        avatarUrl:
          type: string
          format: uri

    UpdateEmployeeRequest:
      type: object
      description: All fields are optional — only provided fields are updated (PATCH semantics)
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 30
        designation:
          type: string
          minLength: 1
          maxLength: 150
        department:
          $ref: "#/components/schemas/Department"
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        employmentStatus:
          $ref: "#/components/schemas/EmploymentStatus"
        startDate:
          type: string
          format: date
        address:
          $ref: "#/components/schemas/Address"
        avatarUrl:
          type: string
          format: uri

    ListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeListItem"
        pagination:
          type: object
          required: [total, page, limit, pages]
          properties:
            total:
              type: integer
              example: 42
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            pages:
              type: integer
              example: 3

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
          example: "email must be a valid email address"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    HealthResponse:
      type: object
      required: [status, timestamp, services]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            mongodb:
              type: string
              enum: [connected, disconnected]

  parameters:
    EmployeeIdParam:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the employee
      schema:
        $ref: "#/components/schemas/EmployeeId"

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Records per page

    SearchParam:
      name: search
      in: query
      schema:
        type: string
        maxLength: 200
      description: Full-text search across name, email, and designation

    DepartmentFilter:
      name: department
      in: query
      schema:
        $ref: "#/components/schemas/Department"
      description: Filter by department

    StatusFilter:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/EmploymentStatus"
      description: Filter by employment status

  responses:
    NotFound:
      description: Employee not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "NOT_FOUND"
            message: "Employee with id 64a7f3c2b1e2f30012345678 not found"

    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "INTERNAL_ERROR"
            message: "An unexpected error occurred"

# ── Paths ────────────────────────────────────────────────────────────────────
paths:

  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                timestamp: "2026-02-23T12:00:00Z"
                services:
                  mongodb: connected

  /employees:
    get:
      tags: [Employees]
      summary: List all employees
      operationId: listEmployees
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/DepartmentFilter"
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: Paginated list of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Employees]
      summary: Create a new employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
            example:
              firstName: "Thava"
              lastName: "Gopal"
              email: "thava.gopal@company.com"
              phone: "+1-416-555-0192"
              designation: "Senior QA Engineer"
              department: "QA"
              employmentType: "Full-Time"
              employmentStatus: "Active"
              startDate: "2022-03-15"
              address:
                street: "123 Innovation Drive"
                city: "Toronto"
                state: "Ontario"
                postalCode: "M5V 3A8"
                country: "Canada"
      responses:
        "201":
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "DUPLICATE_EMAIL"
                message: "An employee with this email already exists"
        "500":
          $ref: "#/components/responses/InternalError"

  /employees/{id}:
    parameters:
      - $ref: "#/components/parameters/EmployeeIdParam"

    get:
      tags: [Employees]
      summary: Get employee by ID
      operationId: getEmployee
      responses:
        "200":
          description: Employee record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Employees]
      summary: Update employee fields
      operationId: updateEmployee
      description: Partial update — only the fields you send are changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Updated employee record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Email already taken by another employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Employees]
      summary: Delete an employee
      operationId: deleteEmployee
      responses:
        "204":
          description: Employee deleted — no body returned
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
